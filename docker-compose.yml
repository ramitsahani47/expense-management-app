services:
  postgres:
    image: postgres:17-alpine
    container_name: expense_postgres

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD:  ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend

    container_name: expense_backend

    working_dir: /app

    command: npm run dev

    depends_on:
      - postgres

    ports:
      - "5000:5000"

    environment:
      PORT:  ${PORT}
      DB_HOST:  ${DB_HOST}
      DB_PORT:  ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD:  ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}

    volumes: 
      - ./backend:/app
      - /app/node_modules
  
volumes:
  postgres_data:
    

